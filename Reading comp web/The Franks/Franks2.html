<script>
const paragraphs = [
    [
        // Original with vocabulary
        "The <span class='vocab' data-definition='A group of Germanic tribes in Europe'>Franks</span> were a group of people from Germanic tribes who became powerful in Western Europe after the fall of the Roman Empire in the late 5th century. Their kingdom was very different from the Roman Empire, especially in how it was <span class='vocab' data-definition='To organize or control'>governed</span>. While the Romans had a strong, centralized government, the Franks had a more <span class='vocab' data-definition='Power spread out among local leaders'>decentralized</span> system, meaning power was spread out among local leaders.",
        "The Franks were a group of people from Germanic tribes who became powerful in Western Europe after the Roman Empire fell in the late 400s. Their kingdom was very different from the Roman Empire, especially in how it was run. The Romans had a strong central government, but the Franks spread power out among local leaders.",
        "The Franks were a group of people from German tribes. They became strong in Western Europe after the Roman Empire fell. Their kingdom was different from the Romans. The Romans had one strong government, but the Franks shared power with local leaders."
    ],
    [
        "In the Roman Empire, the emperor had total control, and officials in the provinces reported directly to him. The Franks, however, didn’t have this kind of central control. Instead, local lords, called counts or dukes, ruled their own areas. These lords were responsible for protecting their land, collecting taxes, and keeping order. The Frankish king relied on these lords for support, rather than having direct control over everything.",
        "In the Roman Empire, the emperor had total control, and leaders in different areas reported to him. The Franks did not have this kind of system. Instead, local leaders called counts or dukes ruled their own lands. They protected their people, collected taxes, and kept order. The Frankish king depended on these local leaders for support instead of controlling everything directly.",
        "In the Roman Empire, one emperor was in charge of everything. Leaders in other places listened to him. The Franks were different. Local leaders called counts or dukes ruled their own land. They protected people, collected taxes, and kept order. The king needed their help instead of controlling everything himself."
    ],
    [
        "Because power was spread out, the Franks didn’t have a single, strong army like the Romans. Instead, local lords built castles to defend their lands. These castles were often built on hills or in strategic locations and served as both military bases and homes for the lords. This was very different from the Romans, who built large walls and had professional soldiers stationed across the empire.",
        "Because power was spread out, the Franks did not have one large, organized army like the Romans. Local lords built castles to defend their land. These castles were often built on hills or in important places and were used as homes and military bases. This was different from the Romans, who built large walls and had trained soldiers across their empire.",
        "The Franks did not have one big army like the Romans. Instead, local lords built castles to protect their land. These castles were often on hills or in strong spots. They were homes and places to fight from. The Romans built big walls and had trained soldiers across their empire."
    ],
    [
        "Even though the Franks were different from the Romans, they borrowed a lot from Roman culture. They used the Latin language, followed Roman laws, and adopted Christianity. For example, the Frankish king Clovis I converted to Christianity, which helped him gain support from the Church and the people. Later, Charlemagne was crowned “Emperor of the Romans” by the pope in 800 CE.",
        "Even though the Franks were different, they copied many parts of Roman culture. They used Latin, followed Roman laws, and became Christians. For example, the Frankish king Clovis I became a Christian, which helped him gain support from the Church and the people. Later, Charlemagne was crowned “Emperor of the Romans” in 800 CE.",
        "The Franks copied some Roman ideas. They used the Latin language and followed some Roman laws. They also became Christians. A king named Clovis became a Christian and gained support from the Church. Later, a king named Charlemagne was crowned “Emperor of the Romans” in 800 CE."
    ],
    [
        "One big difference between the Franks and the Romans was their use of writing. The Romans wrote down almost everything—laws, history, and literature. The Franks, however, left very few written records. Most of what we know about them comes from <span class='vocab' data-definition='The study of human history through excavation of sites'>archaeology</span>, Church writings, and stories from other cultures.",
        "Another difference was how much they wrote things down. The Romans recorded many things like laws, history, and stories. The Franks wrote much less. Most of what we know about them comes from archaeology, Church records, and stories from other groups.",
        "The Romans wrote many things down, like laws and history. The Franks did not write as much. We learn about them from old objects, Church records, and stories from other people. This makes them harder to study."
    ],
    [
        "When a Frankish king died, his kingdom was often split among his sons. This practice, called <span class='vocab' data-definition='Dividing property among children'>partible inheritance</span>, led to a lot of fighting and weakened the kingdom. For example, after Charlemagne’s death, his empire was divided into three parts in 843 CE.",
        "When a Frankish king died, his land was often divided between his sons. This system was called partible inheritance. It often caused fighting and made the kingdom weaker. After Charlemagne died, his empire was split into three parts in 843 CE.",
        "When a Frankish king died, his land was often split between his sons. This caused fighting and made the kingdom weaker. After Charlemagne died, his empire was split into three parts."
    ],
    [
        "Frankish society was led by a group of warrior elites who were skilled fighters and landowners. Below them were farmers, craftsmen, and others. The Franks also included people from many different cultures, like former Romans and other Germanic tribes.",
        "Frankish society was led by strong warriors who owned land. Below them were farmers, craftspeople, and other workers. The Franks also included people from different backgrounds, such as former Romans and other tribes.",
        "Frankish society had strong warriors at the top. They owned land. Below them were farmers and workers. The Franks included people from many backgrounds."
    ]
];

let states = [0,0,0,0,0,0,0];

function toggleText(element, index) {
    states[index] = (states[index] + 1) % 3;
    element.innerHTML = paragraphs[index][states[index]];

    // Change color: 0=black, 1=blue, 2=green
    const colors = ["black", "blue", "green"];
    element.style.color = colors[states[index]];
}

// Initialize with original text
document.querySelectorAll('.para').forEach((el, i) => {
    el.innerHTML = paragraphs[i][0];
    el.style.color = "black";
});
</script>
